<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f7f9ff;
overflow-x:hidden;
}

.hero{
position:relative;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
text-align:center;
overflow:hidden;
}

.hero:before{
content:'';
position:absolute;
width:350px;
height:350px;
background:#6f7cff;
filter:blur(120px);
top:-120px;
left:-120px;
opacity:.35;
border-radius:50%;
}

.hero:after{
content:'';
position:absolute;
width:350px;
height:350px;
background:#9b5cff;
filter:blur(120px);
bottom:-120px;
right:-120px;
opacity:.35;
border-radius:50%;
}

.box{
position:relative;
z-index:2;
max-width:600px;
}

.badge{
display:inline-block;
padding:8px 18px;
background:#fff;
border-radius:30px;
font-size:13px;
font-weight:600;
color:#4f46e5;
box-shadow:0 10px 25px rgba(0,0,0,.08);
margin-bottom:25px;
}

h1{
font-size:52px;
font-weight:800;
line-height:1.1;
color:#111827;
margin-bottom:15px;
}

.gradient{
background:linear-gradient(90deg,#3b82f6,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.desc{
font-size:18px;
color:#555;
line-height:1.8;
margin-bottom:30px;
}

.btns{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:35px;
}

.primary{
background:linear-gradient(90deg,#2563eb,#4f46e5);
padding:16px 30px;
border-radius:40px;
color:#fff;
text-decoration:none;
font-weight:700;
box-shadow:0 12px 30px rgba(37,99,235,.35);
}

.secondary{
background:#fff;
padding:16px 25px;
border-radius:40px;
border:1px solid #ffd4d4;
color:#e11d48;
font-weight:600;
}

.features{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.feature{
background:#fff;
padding:12px 20px;
border-radius:30px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
font-size:14px;
font-weight:600;
color:#444;
}

@media(max-width:768px){

h1{
font-size:38px;
}

.desc{
font-size:16px;
}

.primary,
.secondary{
width:100%;
}

}
</style>
</head>

<body>

<section class="hero">

<div class="box">

<div class="badge">
✨ New! Direct Weekly Payments Available
</div>

<h1>
Earn by Writing<br>
<span class="gradient">HAND WRITING PROJECT WORK</span>
</h1>

<div class="desc">
Trusted Work Opportunity<br>
🏠 Work From Home | 👨‍🎓 Students | 👩 Housewife<br>
⏳ Limited Seats Available 📲 Apply Fast 👇
</div>

<div class="btns">

<a href="https://telegram.me/+qvfmQ_IX20JmN2Q1" class="primary">
JOIN TELEGRAM CHANNEL
</a>

<div class="secondary">
🚨 Limited Seats Left
</div>

</div>

<div class="features">

<div class="feature">✅ Weekly Payouts</div>

<div class="feature">✅ UPI & Bank Payouts</div>

<div class="feature">✅ Flexible Hours</div>

</div>

</div>

</section>

</body>
